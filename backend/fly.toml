app = "medistore-backend"
primary_region = "sin"       # Singapore — change to: bom (Mumbai), lax (LA), fra (Frankfurt)

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings.production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
